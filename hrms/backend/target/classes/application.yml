server:
  port: 8080

spring:
  application:
    name: hrms-backend

  # ---- Using H2 in-memory (zero install, zero file-lock issues) ----
  # Data resets each time the app restarts - fine for local dev/demo.
  # To persist data across restarts instead, use the file-based URL below,
  # but note only ONE backend process can hold that file at a time.
  datasource:
    url: jdbc:h2:mem:hrms_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # ---- H2 file-based (persists data, but only one process can use the file) ----
  # datasource:
  #   url: jdbc:h2:file:./data/hrms_db;DB_CLOSE_ON_EXIT=FALSE
  #   username: sa
  #   password:
  #   driver-class-name: org.h2.Driver

  # ---- MySQL config (use this if you have MySQL installed) ----
  # datasource:
  #   url: jdbc:mysql://localhost:3306/hrms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
  #   username: root
  #   password: root
  #   driver-class-name: com.mysql.cj.jdbc.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # dialect auto-detected; H2Dialect used automatically for H2

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: c2VjdXJlLWhybXMtc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==
    expiration-ms: 86400000        # 24h access token
    refresh-expiration-ms: 604800000  # 7d refresh token
  upload:
    dir: uploads/profile-images

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.hrms: DEBUG
